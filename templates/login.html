<!-- html -->
<!-- File: 'templates/login.html' -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - INSAF Prediction</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.svg') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-5.0.0-beta1.min.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/LineIcons.2.0.css') }}">
</head>
<body>
<style>
  body {
    background-image: url('{{ url_for('static', filename='img/hero/hero-5/hero-bg.svg') }}');
    background-size: cover;
    background-position: center;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

      <div class="text-center mb-4">
        <a href="{{ url_for('main.index') }}" class="text-decoration-none text-muted">
          <i class="lni lni-arrow-left me-2"></i>Return
        </a>
      </div>

      <div class="card shadow-lg border-0" style="border-radius: 20px;">
        <div class="card-body p-5">
          <div class="text-center mb-4">
           <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
              <!--<i class="bi bi-lock text-primary" style="font-size: 2rem;"></i>-->
             <i class="bi bi-person-circle" style="font-size: 2rem;"></i>
            </div>

            <h4 class="fw-bold">Admin Login</h4>
            <p class="text-muted small">INSAF Prediction System</p>
          </div>

          {% with messages = get_flashed_messages() %}
          {% if messages %}
          <div class="alert alert-warning alert-dismissible fade show" role="alert">
            {% for message in messages %}
            <small>{{ message }}</small>
            {% endfor %}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endif %}
          {% endwith %}

          <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
              <label for="username" class="form-label small fw-semibold">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="lni lni-user"></i></span>
                <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="Enter username" required>
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label small fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="lni lni-lock"></i></span>
                <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Enter password" required>
              </div>
            </div>

            <div class="form-check mb-4">
              <input type="checkbox" class="form-check-input" id="remember" name="remember">
              <label class="form-check-label small" for="remember">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill">
              <i class="lni lni-enter me-2"></i>Sign In
            </button>
          </form>

          <p class="text-center text-muted small mt-4 mb-0">
            <i class="lni lni-shield me-1"></i>Access restricted to administrators
          </p>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/bootstrap-5.0.0-beta1.min.js') }}"></script>
</body>
</html>
