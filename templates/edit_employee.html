{% extends "base.html" %}

{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0"><i class="lni lni-pencil"></i> Edit Employee (INSAF)</h3>
        </div>
        <div class="card-body">
          <form method="POST" action="{{ url_for('employees.edit_employee', matricule=employee.matricule) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
              <!-- Personal Information -->
              <div class="col-12">
                <h5 class="border-bottom pb-2 text-primary"><i class="lni lni-user"></i> Personal Information</h5>
              </div>

              <div class="col-md-4">
                <label for="matricule" class="form-label">Matricule</label>
                <input type="number" class="form-control" id="matricule" value="{{ employee.matricule }}" disabled>
              </div>

              <div class="col-md-4">
                <label for="firstName" class="form-label">First Name (Prénom) *</label>
                <input type="text" class="form-control" id="firstName" name="first_name" value="{{ employee.first_name }}" required>
              </div>

              <div class="col-md-4">
                <label for="lastName" class="form-label">Last Name (Nom) *</label>
                <input type="text" class="form-control" id="lastName" name="last_name" value="{{ employee.last_name }}" required>
              </div>

              <div class="col-md-4">
                <label for="birth_date" class="form-label">Birth Date</label>
                <input type="date" class="form-control" id="birth_date" name="birth_date" value="{{ employee.birth_date or '' }}">
              </div>

              <div class="col-md-4">
                <label for="situation_familiale" class="form-label">Family Status</label>
                <select class="form-select" id="situation_familiale" name="situation_familiale">
                  <option value="">-- Select --</option>
                  <option value="Célibataire" {{ 'selected' if employee.situation_familiale == 'Célibataire' }}>Célibataire</option>
                  <option value="Marié(e)" {{ 'selected' if employee.situation_familiale == 'Marié(e)' }}>Marié(e)</option>
                  <option value="Divorcé(e)" {{ 'selected' if employee.situation_familiale == 'Divorcé(e)' }}>Divorcé(e)</option>
                  <option value="Veuf(ve)" {{ 'selected' if employee.situation_familiale == 'Veuf(ve)' }}>Veuf(ve)</option>
                </select>
              </div>

              <div class="col-md-4">
                <label for="nombre_enfants" class="form-label">Number of Children</label>
                <input type="number" class="form-control" id="nombre_enfants" name="nombre_enfants" min="0" value="{{ employee.nombre_enfants or 0 }}">
              </div>

              <!-- Administrative Classification (INSAF) -->
              <div class="col-12 mt-4">
                <h5 class="border-bottom pb-2 text-primary"><i class="lni lni-certificate"></i> Administrative Classification</h5>
              </div>

              <div class="col-md-3">
                <label for="grade" class="form-label">Grade</label>
                <select class="form-select" id="grade" name="grade">
                  <option value="">-- Select --</option>
                  <option value="A1" {{ 'selected' if employee.grade == 'A1' }}>A1 - Cadre Supérieur</option>
                  <option value="A2" {{ 'selected' if employee.grade == 'A2' }}>A2 - Cadre</option>
                  <option value="A3" {{ 'selected' if employee.grade == 'A3' }}>A3 - Cadre Adjoint</option>
                  <option value="B" {{ 'selected' if employee.grade == 'B' }}>B - Maîtrise</option>
                  <option value="C" {{ 'selected' if employee.grade == 'C' }}>C - Exécution</option>
                  <option value="D" {{ 'selected' if employee.grade == 'D' }}>D - Ouvrier</option>
                </select>
              </div>

              <div class="col-md-3">
                <label for="echelon" class="form-label">Échelon</label>
                <select class="form-select" id="echelon" name="echelon">
                  <option value="">-- Select --</option>
                  {% for i in range(1, 13) %}
                  <option value="{{ i }}" {{ 'selected' if employee.echelon == i }}>{{ i }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="col-md-3">
                <label for="indice" class="form-label">Indice</label>
                <input type="number" class="form-control" id="indice" name="indice" min="100" max="1000" value="{{ employee.indice or '' }}">
              </div>

              <div class="col-md-3">
                <label for="corps" class="form-label">Corps</label>
                <select class="form-select" id="corps" name="corps">
                  <option value="">-- Select --</option>
                  <option value="Administratif" {{ 'selected' if employee.corps == 'Administratif' }}>Administratif</option>
                  <option value="Technique" {{ 'selected' if employee.corps == 'Technique' }}>Technique</option>
                  <option value="Paramédical" {{ 'selected' if employee.corps == 'Paramédical' }}>Paramédical</option>
                  <option value="Enseignant" {{ 'selected' if employee.corps == 'Enseignant' }}>Enseignant</option>
                  <option value="Ouvrier" {{ 'selected' if employee.corps == 'Ouvrier' }}>Ouvrier</option>
                </select>
              </div>

              <!-- Salary Information -->
              <div class="col-12 mt-4">
                <h5 class="border-bottom pb-2 text-primary"><i class="lni lni-coin"></i> Salary Components</h5>
              </div>

              <div class="col-md-4">
                <label for="salaire_base" class="form-label">Salaire de Base (TND)</label>
                <input type="number" class="form-control" id="salaire_base" name="salaire_base" step="0.01" value="{{ employee.salaire_base or '' }}">
              </div>

              <div class="col-md-4">
                <label for="indemnite_residence" class="form-label">Indemnité de Résidence</label>
                <input type="number" class="form-control" id="indemnite_residence" name="indemnite_residence" step="0.01" value="{{ employee.indemnite_residence or '' }}">
              </div>

              <div class="col-md-4">
                <label for="indemnite_transport" class="form-label">Indemnité de Transport</label>
                <input type="number" class="form-control" id="indemnite_transport" name="indemnite_transport" step="0.01" value="{{ employee.indemnite_transport or '' }}">
              </div>

              <!-- Dates -->
              <div class="col-12 mt-4">
                <h5 class="border-bottom pb-2 text-primary"><i class="lni lni-calendar"></i> Employment Dates</h5>
              </div>

              <div class="col-md-4">
                <label for="dateJoined" class="form-label">Recruitment Date</label>
                <input type="date" class="form-control" id="dateJoined" name="date_joined" value="{{ employee.date_joined or '' }}">
              </div>

              <div class="col-md-4">
                <label for="dateTitularisation" class="form-label">Titularisation Date</label>
                <input type="date" class="form-control" id="dateTitularisation" name="date_titularisation" value="{{ employee.date_titularisation or '' }}">
              </div>

              <div class="col-md-4">
                <label for="dateLeft" class="form-label">Departure Date</label>
                <input type="date" class="form-control" id="dateLeft" name="date_left" value="{{ employee.date_left or '' }}">
              </div>

              <!-- Buttons -->
              <div class="col-12 mt-4">
                <div class="d-flex gap-2 justify-content-end">
                  <a href="{{ url_for('employees.list_employees') }}" class="btn btn-secondary rounded-pill px-4">
                    <i class="lni lni-arrow-left"></i> Cancel
                  </a>
                  <button type="submit" class="btn btn-primary rounded-pill px-4">
                    <i class="lni lni-checkmark"></i> Save Changes
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
